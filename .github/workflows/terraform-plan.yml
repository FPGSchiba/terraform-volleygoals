name: Terraform Plan
on:
  pull_request:
    branches: [development, main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Plan (${{ github.base_ref == 'main' && 'prod' || 'dev' }})
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ github.base_ref == 'main' && 'prod' || 'dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: files/src/go.mod
          cache: true

      - name: AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          audience: sts.amazonaws.com
          aws-region: eu-central-1
          role-to-assume: arn:aws:iam::${{ env.ENVIRONMENT == 'prod' && '102582898933' || '771805193031' }}:role/github-terraform-plan

      - name: Terraform Init
        run: terraform init -backend-config=environments/${{ env.ENVIRONMENT }}/backend.hcl

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -var-file=environments/${{ env.ENVIRONMENT }}/terraform.tfvars -no-color -out=tfplan
        continue-on-error: true

      - name: Post Plan to PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const output = `#### Terraform Plan - \`${{ env.ENVIRONMENT }}\` ${{ steps.plan.outcome == 'success' && '✅' || '❌' }}

            <details><summary>Show Plan</summary>

            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Triggered by @${{ github.actor }} on \`${{ github.event.pull_request.head.ref }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail on Plan Error
        if: steps.plan.outcome == 'failure'
        run: exit 1
